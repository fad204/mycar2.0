name: Build mod

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Get the code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Pillow (for texture generation)
        run: pip install Pillow

      - name: Generate textures and asset JSONs
        run: python generate_textures.py

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '7.6'

      - name: Build the mod
        run: gradle build --no-daemon

      - name: Upload the finished jar
        uses: actions/upload-artifact@v4
        with:
          name: mycar-mod
          path: build/libs/mycar-1.5.0.jar
          if-no-files-found: error
